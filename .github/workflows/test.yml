name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime + test deps
        # Skip the heavy native drivers (pyodbc, mssql) — tests don't need them
        # and they cause slow apt-get installs on every run. The `safety` /
        # `rls` / `auth` / `hardening` / `proxy-sqlite` suites only need
        # sqlglot, sqlalchemy, fastapi, cryptography, fastmcp, httpx.
        run: |
          python -m pip install --upgrade pip
          # Build a slimmed install set.
          pip install \
            sqlglot \
            sqlalchemy \
            fastapi \
            "uvicorn[standard]" \
            cryptography \
            fastmcp \
            httpx \
            pydantic \
            pydantic-settings \
            python-dotenv \
            python-multipart \
            stripe \
            sendgrid \
            redis \
            pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
